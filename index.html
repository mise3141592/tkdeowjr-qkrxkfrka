<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<link rel="manifest" href="teacher-manifest.json">
<title>현장체험학습 안전 앱</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --accent: #00d4ff;
    --accent2: #00e5a0;
    --text: #e8eaf6;
    --dim: #6b8898;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    padding: calc(var(--safe-top) + 20px) 24px calc(var(--safe-bottom) + 20px);
  }
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,212,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(0,229,160,0.07) 0%, transparent 70%);
  }
  .logo-area { text-align: center; margin-bottom: 48px; position: relative; }
  .logo-emoji { font-size: 64px; display: block; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .logo-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; color: var(--accent); }
  .logo-sub { font-size: 14px; color: var(--dim); margin-top: 6px; }

  .select-area { width: 100%; max-width: 360px; }
  .select-label { font-size: 12px; font-weight: 700; color: var(--dim); letter-spacing: 2px; text-align: center; margin-bottom: 20px; }

  .role-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 24px 20px;
    display: flex; align-items: center; gap: 18px;
    cursor: pointer; margin-bottom: 12px;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    text-decoration: none; color: var(--text);
  }
  .role-card:active { transform: scale(0.97); }
  .role-card.teacher:hover, .role-card.teacher:focus {
    background: rgba(0,212,255,0.1);
    border-color: rgba(0,212,255,0.4);
    box-shadow: 0 0 30px rgba(0,212,255,0.1);
  }
  .role-card.student:hover, .role-card.student:focus {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.4);
    box-shadow: 0 0 30px rgba(0,229,160,0.1);
  }
  .role-icon-wrap {
    width: 56px; height: 56px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; flex-shrink: 0;
  }
  .teacher .role-icon-wrap { background: rgba(0,212,255,0.15); }
  .student .role-icon-wrap { background: rgba(0,229,160,0.15); }
  .role-info { flex: 1; }
  .role-name { font-size: 18px; font-weight: 900; }
  .teacher .role-name { color: var(--accent); }
  .student .role-name { color: var(--accent2); }
  .role-desc { font-size: 12px; color: var(--dim); margin-top: 4px; line-height: 1.5; }
  .role-arrow { font-size: 20px; color: var(--dim); }

  .footer-text {
    text-align: center;
    font-size: 11px;
    color: var(--dim);
    margin-top: 32px;
    line-height: 1.8;
  }

  /* 설치 배너 */
  .install-banner {
    position: fixed; bottom: calc(var(--safe-bottom) + 16px); left: 16px; right: 16px;
    background: rgba(0,212,255,0.12);
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 16px;
    padding: 14px 16px;
    display: none; align-items: center; gap: 12px;
    z-index: 100;
    animation: slideUp 0.3s ease-out;
  }
  .install-banner.show { display: flex; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  .install-text { flex: 1; font-size: 13px; font-weight: 600; color: var(--accent); }
  .install-sub { font-size: 11px; color: var(--dim); }
  .install-btn { background: var(--accent); color: #0a0f1e; border: none; padding: 8px 14px; border-radius: 10px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="logo-area">
  <span class="logo-emoji">🏫</span>
  <div class="logo-title">현장체험학습</div>
  <div class="logo-sub">각화중학교 안전관리 시스템 · 2026</div>
</div>

<div class="select-area">
  <div class="select-label">사용자 유형을 선택하세요</div>

  <a href="teacher.html" class="role-card teacher">
    <div class="role-icon-wrap">👩‍🏫</div>
    <div class="role-info">
      <div class="role-name">교사용 앱</div>
      <div class="role-desc">민원 대응 · 실시간 추적<br>AI 자동배정 · 경로 분석</div>
    </div>
    <div class="role-arrow">›</div>
  </a>

  <a href="student.html" class="role-card student">
    <div class="role-icon-wrap">🎒</div>
    <div class="role-info">
      <div class="role-name">학생용 앱</div>
      <div class="role-desc">일정 확인 · 방/버스 배정<br>준비물 체크 · SOS 긴급연락</div>
    </div>
    <div class="role-arrow">›</div>
  </a>
</div>

<div class="footer-text">
  🔒 2022-2024 교통사고 데이터 분석 기반<br>
  교육청 현장체험학습 운영 지침 준수<br>
  GPS 데이터는 여행 종료 후 즉시 삭제됩니다
</div>

<!-- 설치 배너 (PWA) -->
<div class="install-banner" id="installBanner">
  <div>
    <div class="install-text">홈 화면에 추가하기</div>
    <div class="install-sub">앱처럼 빠르게 실행됩니다</div>
  </div>
  <button class="install-btn" id="installBtn">설치</button>
</div>

<script>
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
